---
name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false


jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 20
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      release_major: ${{ steps.release.outputs.major }}
      release_minor: ${{ steps.release.outputs.minor }}
      release_patch: ${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: .config/.release-please-config.json
          manifest-file: .config/.release-please-manifest.json

  build:
    name: Build release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    timeout-minutes: 20
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
      - name: Build Go package
        run: go build -mod=readonly ./cmd/helm-autoupdate/main.go
      - name: Verify Go package
        run: go mod verify
      - name: Test Go package
        run: go test -v ./...
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bostjanbozic/helm-autoupdate:${{ needs.release-please.outputs.release_major }}.${{ needs.release-please.outputs.release_minor }}.${{ needs.release-please.outputs.release_patch }}
            ghcr.io/bostjanbozic/helm-autoupdate:${{ needs.release-please.outputs.release_major }}
            ghcr.io/bostjanbozic/helm-autoupdate:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tag-major:
    name: Update major version tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 5
    needs:
      - release-please
      - build
    if: ${{ needs.release-please.outputs.release_created }}
    steps:
      - uses: actions/checkout@v6
      - name: Update v{major} tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "v${{ needs.release-please.outputs.release_major }}"
          git push origin "v${{ needs.release-please.outputs.release_major }}" --force
